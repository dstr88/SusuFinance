services:
  # ── Close lapsed votes ─────────────────────────────────────────────────────
  # Resolves circle votes whose window has ended (majority proposals, blackball,
  # unanimous_no expulsions). Idempotent — the status='open' guard makes a second
  # run a no-op — and the drill-in also calls closeExpiredVotes opportunistically,
  # so a lapsed vote still resolves on the next view even if this cron is not
  # provisioned. Daily is ample for 7–10 day windows.
  #
  # Required env vars (set in the Render dashboard):
  #   CRON_SECRET        — same value as on the web service
  #   APP_URL            — e.g. https://susufinance.com
  - type: cron
    name: close-votes
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    schedule: "0 6 * * *"
    startCommand: >-
      curl -sf --max-time 300
      -H "x-cron-secret: $CRON_SECRET"
      "$APP_URL/api/cron/close-votes"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_URL
        sync: false

  # ── Promo-code expiry ──────────────────────────────────────────────────────
  # Sweeps expired promo codes. Same env vars as above.
  - type: cron
    name: promo-expiry
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    schedule: "0 7 * * *"
    startCommand: >-
      curl -sf --max-time 300
      -H "x-cron-secret: $CRON_SECRET"
      "$APP_URL/api/cron/promo-expiry"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_URL
        sync: false
